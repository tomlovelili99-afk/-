<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手机端预览 | 熊鹏程作品集</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: #0b1220;
        background:
          radial-gradient(circle at 18% 12%, rgba(20, 93, 255, .18), transparent 28rem),
          radial-gradient(circle at 82% 10%, rgba(6, 212, 255, .16), transparent 24rem),
          linear-gradient(135deg, #eef5ff, #f8fbff);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-layout {
        width: min(100%, 1180px);
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 42px;
        align-items: center;
      }

      .preview-copy {
        display: grid;
        gap: 16px;
      }

      .preview-copy span {
        width: fit-content;
        padding: 8px 12px;
        border: 1px solid rgba(20, 93, 255, .16);
        border-radius: 999px;
        color: #145dff;
        background: rgba(255, 255, 255, .72);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: .08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        max-width: 560px;
        font-size: clamp(38px, 5vw, 70px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        max-width: 520px;
        margin: 0;
        color: #526073;
        font-size: 17px;
        line-height: 1.8;
      }

      .quick-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .quick-links a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        padding: 0 16px;
        border-radius: 12px;
        color: #17346d;
        text-decoration: none;
        background: rgba(255, 255, 255, .76);
        box-shadow: 0 12px 28px rgba(31, 67, 137, .1);
        font-weight: 800;
      }

      .phone {
        width: 430px;
        max-width: calc(100vw - 40px);
        padding: 14px;
        border-radius: 42px;
        background: #07101f;
        box-shadow: 0 30px 90px rgba(8, 31, 80, .28);
      }

      .phone-bar {
        width: 118px;
        height: 5px;
        margin: 0 auto 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, .2);
      }

      iframe {
        display: block;
        width: 390px;
        max-width: 100%;
        height: 844px;
        max-height: calc(100vh - 96px);
        border: 0;
        border-radius: 30px;
        background: #fff;
      }

      @media (max-width: 880px) {
        body {
          padding: 18px;
        }

        .preview-layout {
          grid-template-columns: 1fr;
          gap: 22px;
          justify-items: center;
        }

        .preview-copy {
          width: min(100%, 430px);
        }

        h1 {
          font-size: 36px;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-layout">
      <section class="preview-copy">
        <span>Mobile Preview</span>
        <h1>电脑上查看手机端排版效果</h1>
        <p>右侧是 390px 宽度的手机预览框。下面按钮可以快速跳到首页、项目区和联系区。</p>
        <div class="quick-links">
          <a href="/mobile-preview.html">首页</a>
          <a href="/mobile-preview.html#projects">项目区</a>
          <a href="/mobile-preview.html#contact">联系区</a>
        </div>
      </section>
      <section class="phone" aria-label="手机端网站预览">
        <div class="phone-bar" aria-hidden="true"></div>
        <iframe id="mobileFrame" title="手机端网站预览" src="/"></iframe>
      </section>
    </main>
    <script>
      const frame = document.querySelector('#mobileFrame');
      const syncFrame = () => {
        frame.src = `/${window.location.hash || ''}`;
      };

      syncFrame();
      window.addEventListener('hashchange', syncFrame);
    </script>
  </body>
</html>
